name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - run: npm ci
      - run: npm run build
      
      - name: Deploy to Server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          
          # Test SSH connection
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "echo 'SSH OK'"
          
          # Create directories
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "sudo mkdir -p /var/www/dse-english-deploy && sudo chown ubuntu:ubuntu /var/www/dse-english-deploy"
          
          # Deploy files
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r .next package.json package-lock.json ubuntu@$SERVER_IP:/var/www/dse-english-deploy/
          
          # Install and restart
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "cd /var/www/dse-english-deploy && npm install --production && sudo cp -r .next /var/www/dse-english/ && sudo cp package.json /var/www/dse-english/ && pm2 restart dse-enhancer || pm2 start npm --name dse-enhancer -- start"
          
          echo "✅ Deployed successfully!"
