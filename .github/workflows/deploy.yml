name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      
      - name: Deploy to Server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "pm2 stop dse-enhancer || true"
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "sudo mkdir -p /var/www/dse-enhancer && sudo chown -R ubuntu:ubuntu /var/www/dse-enhancer"
          
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r .next package.json package-lock.json prisma public ubuntu@$SERVER_IP:/var/www/dse-enhancer/
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "cd /var/www/dse-enhancer && npm install --production && npx prisma generate && pm2 restart dse-enhancer || pm2 start npm --name dse-enhancer -- start"
          
          echo "Deployed to http://$SERVER_IP:3000"