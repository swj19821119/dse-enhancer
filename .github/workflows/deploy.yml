name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check build output
        run: |
          echo "Checking build output..."
          ls -la out/ || echo "out directory not found"
          echo "Root directory:"
          ls -la

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 43.139.84.228 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          echo "Deploying files to server..."
          if [ -d "out" ]; then
            scp -i ~/.ssh/deploy_key -r out/* ubuntu@43.139.84.228:/var/www/dse-english/
          else
            echo "Error: out directory not found"
            exit 1
          fi

      - name: Restart Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@43.139.84.228 "sudo systemctl reload nginx"
