name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install missing types
        run: npm install --save-dev @types/jsonwebtoken

      - name: Build project
        run: npm run build

      - name: Check build output
        run: |
          echo "Checking build output..."
          if [ -d "out" ]; then
            echo "✓ out directory exists"
            ls -la out/
          else
            echo "✗ out directory not found"
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 43.139.84.228 >> ~/.ssh/known_hosts
          echo "SSH setup completed"

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@43.139.84.228 "echo '✓ SSH connection successful' && ls -la /var/www/dse-english/"

      - name: Deploy to server
        run: |
          echo "Starting deployment..."
          if [ -d "out" ]; then
            echo "Deploying files from out/ directory"
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r out/* ubuntu@43.139.84.228:/var/www/dse-english/
            echo "✓ Files deployed successfully"
          else
            echo "✗ Error: out directory not found"
            exit 1
          fi

      - name: Restart Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@43.139.84.228 "sudo systemctl reload nginx && echo '✓ Nginx reloaded successfully'"
