name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 43.139.84.228 >> ~/.ssh/known_hosts

      - name: Deploy .next and package files only
        run: |
          echo "Deploying .next and package.json..."
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r .next ubuntu@43.139.84.228:/var/www/dse-english/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no package.json ubuntu@43.139.84.228:/var/www/dse-english/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no package-lock.json ubuntu@43.139.84.228:/var/www/dse-english/

      - name: Install dependencies and restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@43.139.84.228 "cd /var/www/dse-english && npm install && pm2 restart dse-enhancer"
